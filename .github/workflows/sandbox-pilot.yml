name: Sandbox Pilot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: read
  actions: read

jobs:
  run-pilot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      
      - name: Build ZCC binary
        run: |
          make zcc
          test -x zcc

      - name: Build Sandbox Image
        run: |
          docker build -f Dockerfile.sandbox -t chimera-sandbox:latest .
          IMAGE_ID=$(docker inspect --format='{{.Id}}' chimera-sandbox:latest)
          echo "IMAGE_ID=${IMAGE_ID}" >> "$GITHUB_ENV"
          
      - name: Inject Local Approvals
        # Ensure the built image hash is explicitly trusted for the local offline run
        run: |
          python -c "
          import json, os
          with open('policy_approvals.json', 'r') as f: app = json.load(f)
          app['approved_dockerfile_hashes'].append(os.environ['IMAGE_ID'])
          with open('policy_approvals.json', 'w') as f: json.dump(app, f)
          "

      - name: Execute Offline Sandbox Pilot
        run: |
          mkdir -p pilot_artifacts
          docker run --rm \
            --network=none \
            --read-only \
            --cap-drop=ALL \
            --security-opt no-new-privileges \
            --pids-limit=128 \
            --memory=512m \
            --cpus=1 \
            --tmpfs /tmp:rw,nosuid,size=64m \
            -e CHIMERA_SANDBOX_ONLY=1 \
            -v "$PWD/pilot_artifacts:/workspace/release_artifacts" \
            chimera-sandbox:latest \
            python scheduled_sandbox_pilot.py --once

      - name: Prevent Mock Bypasses
        run: |
          if grep -q "CHIMERA_ALLOW_LOCAL_NETWORK_DIAGNOSTIC" pilot_artifacts/sandbox_attestation.json; then
            echo "FATAL: Local network override detected in release evidence."
            exit 1
          fi
          if grep -q '"network_reachable": true' pilot_artifacts/sandbox_attestation.json; then
            echo "FATAL: Network was reachable in attestation."
            exit 1
          fi
          
      - name: Verify Signed Manifest
        run: |
          cd pilot_artifacts
          python ../verify_release_artifacts.py

      - name: Upload Verified Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pilot-evidence-bundle
          path: pilot_artifacts/
          retention-days: 90
