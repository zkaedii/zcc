name: Layout Bug
description: Report a ZCC size/alignment/offset bug
title: "[layout]: "
labels:
  - layout
  - compiler-correctness
body:
  - type: textarea
    id: testcase
    attributes:
      label: Test case
      description: Minimal C test case
      render: c
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: target
    attributes:
      label: Target triple
      placeholder: x86_64-linux-gnu
    validations:
      required: true