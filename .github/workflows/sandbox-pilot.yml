name: Sandbox Pilot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: read
  actions: read

concurrency:
  group: sandbox-pilot-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  PYTHONUNBUFFERED: "1"

jobs:
  run-pilot:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Preflight Diagnostics
        run: |
          set -euxo pipefail
          echo "Runner user:"
          id
          echo "Workspace:"
          pwd
          echo "Git revision:"
          git rev-parse HEAD
          echo "Python:"
          python --version
          echo "Docker:"
          docker --version
          docker info
          echo "Disk:"
          df -h
          echo "Memory:"
          free -h || true

      - name: Build ZCC binary
        run: |
          set -euxo pipefail
          make zcc
          test -x zcc
          sha256sum zcc

      - name: Build Sandbox Image
        run: |
          set -euxo pipefail

          mkdir -p pilot_artifacts/diagnostics

          docker build -f Dockerfile.sandbox -t chimera-sandbox:latest .
          IMAGE_ID=$(docker inspect --format='{{.Id}}' chimera-sandbox:latest)
          echo "IMAGE_ID=${IMAGE_ID}" >> "$GITHUB_ENV"

          docker image inspect chimera-sandbox:latest > pilot_artifacts/diagnostics/docker_image_inspect.json
          docker history --no-trunc chimera-sandbox:latest > pilot_artifacts/diagnostics/docker_history.txt
          sha256sum Dockerfile.sandbox > pilot_artifacts/diagnostics/dockerfile.sha256
          sha256sum zcc > pilot_artifacts/diagnostics/zcc.sha256

      - name: Validate Required Inputs
        run: |
          set -euxo pipefail
          test -f Dockerfile.sandbox
          test -f fortify_policy.json
          test -f policy_approvals.json
          test -f verify_release_artifacts.py
          test -f sign_release_artifacts.py
          test -f sandbox_attestation.py
          python -m json.tool fortify_policy.json >/dev/null
          python -m json.tool policy_approvals.json >/dev/null

      - name: Execute Offline Sandbox Pilot
        run: |
          set -euxo pipefail

          mkdir -p pilot_artifacts
          chmod 777 pilot_artifacts

          normalize_artifacts() {
            if [ -d pilot_artifacts ]; then
              sudo chown -R "$(id -u):$(id -g)" pilot_artifacts || true
              chmod -R u+rwX,go-rwx pilot_artifacts || true
            fi
          }

          trap normalize_artifacts EXIT

          # Run the image's default hardened entrypoint:
          #   python3 /app/sandbox_entrypoint.py
          # This produces chimera_run_report.json in /app/scratch.
          docker run --rm \
            --network=none \
            --read-only \
            --cap-drop=ALL \
            --security-opt no-new-privileges \
            --pids-limit=128 \
            --memory=512m \
            --cpus=1 \
            --tmpfs /tmp:rw,nosuid,size=64m \
            -e CHIMERA_SANDBOX_ONLY=1 \
            -v "$PWD/pilot_artifacts:/app/scratch:rw" \
            chimera-sandbox:latest

          normalize_artifacts

          # Run attestation explicitly. The Dockerfile ENTRYPOINT would otherwise
          # keep routing commands through sandbox_entrypoint.py.
          docker run --rm \
            --network=none \
            --read-only \
            --cap-drop=ALL \
            --security-opt no-new-privileges \
            --pids-limit=128 \
            --memory=512m \
            --cpus=1 \
            --tmpfs /tmp:rw,nosuid,size=64m \
            -e CHIMERA_SANDBOX_ONLY=1 \
            -v "$PWD/pilot_artifacts:/app/scratch:rw" \
            --entrypoint python3 \
            chimera-sandbox:latest \
            /app/sandbox_attestation.py

          normalize_artifacts

          mkdir -p pilot_artifacts/release_artifacts

          find pilot_artifacts -type f -name '*.json' ! -path 'pilot_artifacts/release_artifacts/*' \
            -exec cp {} pilot_artifacts/release_artifacts/ \;

          cd pilot_artifacts
          python ../sign_release_artifacts.py
          python ../verify_release_artifacts.py
          cd ..

          normalize_artifacts

      - name: Inspect Pilot Artifacts
        if: always()
        run: |
          echo "PWD=$(pwd)"
          echo "User=$(id)"
          echo "Artifact tree:"
          find pilot_artifacts -maxdepth 5 -printf '%M %u:%g %s %p\n' | sort || true

      - name: Validate Artifact Layout
        run: |
          set -euxo pipefail
          test -d pilot_artifacts
          test -d pilot_artifacts/release_artifacts
          test -f pilot_artifacts/chimera_run_report.json
          test -f pilot_artifacts/sandbox_attestation.json
          test -f pilot_artifacts/release_artifacts/manifest.json
          test -f pilot_artifacts/release_artifacts/chimera_run_report.json
          test -f pilot_artifacts/release_artifacts/sandbox_attestation.json
          test -r pilot_artifacts/release_artifacts/manifest.json

      - name: Validate Artifact Permissions
        run: |
          set -euxo pipefail
          sudo chown -R "$(id -u):$(id -g)" pilot_artifacts
          chmod -R u+rwX,go-rwx pilot_artifacts

          find pilot_artifacts -type f -exec test -r {} \;
          find pilot_artifacts -type d -exec test -x {} \;

      - name: Reject Symlinks In Artifact Bundle
        run: |
          set -euxo pipefail
          if find pilot_artifacts -type l | grep -q .; then
            echo "FATAL: Symlinks detected in artifact bundle."
            find pilot_artifacts -type l -ls
            exit 1
          fi

      - name: Validate JSON Artifacts
        run: |
          set -euxo pipefail
          find pilot_artifacts -type f -name '*.json' -print0 | while IFS= read -r -d '' file; do
            echo "Validating JSON: $file"
            python -m json.tool "$file" >/dev/null
          done

      - name: Prevent Mock Bypasses
        run: |
          set -euxo pipefail

          ATTESTATION="$(find pilot_artifacts -maxdepth 5 -type f -name 'sandbox_attestation.json' | sort | head -n 1 || true)"

          if [ -z "$ATTESTATION" ]; then
            echo "FATAL: sandbox_attestation.json was not found."
            echo "Artifact tree:"
            find pilot_artifacts -maxdepth 5 -printf '%M %u:%g %s %p\n' | sort || true
            exit 1
          fi

          echo "Using attestation: $ATTESTATION"
          test -r "$ATTESTATION"

          if grep -q "CHIMERA_ALLOW_LOCAL_NETWORK_DIAGNOSTIC" "$ATTESTATION"; then
            echo "FATAL: Local network override detected in release evidence."
            exit 1
          fi

          if grep -q '"network_reachable": true' "$ATTESTATION"; then
            echo "FATAL: Network was reachable in attestation."
            exit 1
          fi

          if grep -q '"secrets_detected": true' "$ATTESTATION"; then
            echo "FATAL: Secrets were detected in attestation."
            exit 1
          fi

          if grep -q '"status": "failed"' "$ATTESTATION"; then
            echo "FATAL: Attestation status is failed."
            exit 1
          fi

      - name: Verify Signed Manifest
        run: |
          set -euxo pipefail
          cd pilot_artifacts
          python ../verify_release_artifacts.py

      - name: Generate Artifact Checksums
        if: always()
        run: |
          set -euxo pipefail
          sudo chown -R "$(id -u):$(id -g)" pilot_artifacts || true
          chmod -R u+rwX,go-rwx pilot_artifacts || true

          if [ -d pilot_artifacts ]; then
            mkdir -p pilot_artifacts/diagnostics
            find pilot_artifacts -type f ! -path 'pilot_artifacts/diagnostics/artifact_files.sha256' -print0 \
              | sort -z \
              | xargs -0 -r sha256sum \
              > pilot_artifacts/diagnostics/artifact_files.sha256
          fi

      - name: Write Pilot Summary
        if: always()
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          import os
          from pathlib import Path

          run_id = os.environ.get("GITHUB_RUN_ID", "unknown")
          sha = os.environ.get("GITHUB_SHA", "unknown")
          image_id = os.environ.get("IMAGE_ID", "unknown")

          print("## Sandbox Pilot Summary")
          print()
          print(f"- Run ID: `{run_id}`")
          print(f"- Commit: `{sha}`")
          print(f"- Image ID: `{image_id}`")
          print()

          print("### Artifact Tree")
          print("```text")
          root = Path("pilot_artifacts")
          if root.exists():
              rows = []
              for p in sorted(root.rglob("*")):
                  try:
                      st = p.stat()
                      kind = "d" if p.is_dir() else "f"
                      rows.append(f"{kind} {st.st_size:>10} {p}")
                  except OSError as exc:
                      rows.append(f"? ERROR {p}: {exc}")
              print("\n".join(rows))
          else:
              print("pilot_artifacts missing")
          print("```")
          print()

          manifest_path = Path("pilot_artifacts/release_artifacts/manifest.json")
          print("### Manifest")
          if manifest_path.exists():
              m = json.loads(manifest_path.read_text())
              print(f"- Bundle hash: `{m.get('bundle_hash')}`")
              print(f"- Artifact count: `{len(m.get('artifacts', []))}`")
              for item in m.get("artifacts", []):
                  print(f"  - `{item.get('path')}`")
          else:
              print("- Missing")
          print()

          attestation_matches = sorted(Path("pilot_artifacts").rglob("sandbox_attestation.json"))
          print("### Attestation")
          if attestation_matches:
              attestation_path = attestation_matches[0]
              a = json.loads(attestation_path.read_text())
              print(f"- Path: `{attestation_path}`")
              print(f"- Status: `{a.get('status')}`")
              print(f"- Network reachable: `{a.get('network_reachable')}`")
              print(f"- Secrets detected: `{a.get('secrets_detected')}`")
              print(f"- Policy hash: `{a.get('policy_hash')}`")
              print(f"- Python version: `{a.get('python_version')}`")
          else:
              print("- Missing")
          print()

          report_path = Path("pilot_artifacts/chimera_run_report.json")
          print("### Chimera Run")
          if report_path.exists():
              r = json.loads(report_path.read_text())
              print(f"- Status: `{r.get('status')}`")
              print(f"- Generations completed: `{r.get('generations_completed')}`")
              print(f"- Policy hash: `{r.get('policy_hash')}`")
              print(f"- Compiler version: `{r.get('compiler_version')}`")
          else:
              print("- Missing")
          print()
          PY

      - name: Final Artifact Permission Normalize
        if: always()
        run: |
          if [ -d pilot_artifacts ]; then
            sudo chown -R "$(id -u):$(id -g)" pilot_artifacts || true
            chmod -R u+rwX,go-rwx pilot_artifacts || true
          fi

      - name: Upload Verified Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pilot-evidence-bundle-${{ github.run_id }}
          path: pilot_artifacts/
          retention-days: 90
          if-no-files-found: warn
